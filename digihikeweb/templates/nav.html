{% load static %}
<nav class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
        <a href="/" class="flex items-center gap-3">
            <img src="{% static 'logo.jpeg' %}" alt="digihike logo" class="h-12 w-12 rounded-2xl object-cover shadow-sm" />
            <div>
                <p class="text-lg font-semibold text-slate-900">TRIATHIKE</p>
                <p class="text-xs uppercase tracking-[0.26em] text-slate-500">crazy 88</p>
            </div>
        </a>
        <div class="flex flex-1 items-center justify-end gap-3">
            {% if request.user.is_staff %}
            <a href="/admin" class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-700">Admin</a>
            {% endif %}
            {% if request.user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button type="submit" class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                    Uitloggen
                </button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-700">Inloggen</a>
            {% endif %}
        </div>
    </div>
</nav>
