{% load static %}

<!DOCTYPE html>
<html lang="nl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="shortcut icon" type="image/x-icon" href="/static/favicon.ico"/>
        <title>{% block page_title %}digihike - STAM{% endblock %}</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            :root {
                --brand-red: #d32f16;
                --brand-orange: #ec6e05;
                --brand-orange-dark: #b04403;
                --brand-surface: #ffffff;
                --brand-surface-strong: #0f172a;
            }
            body {
                min-height: 100vh;
                /* background-color: #f8fafc; */
                background-image: url('{% static "achtergrond.png" %}');
                background-size: cover;
                background-repeat: repeat;
                background-attachment: scroll;
                background-position: top left;
            }
            input[type="text"],
            input[type="password"],
            input[type="email"],
            textarea,
            select {
                width: 100%;
                border-radius: 1rem;
                border: 1px solid #cbd5e1;
                background: #ffffff;
                padding: 0.95rem 1rem;
                color: #0f172a;
                font-size: 1rem;
                outline: none;
                box-shadow: inset 0 1px 2px rgba(15,23,42,0.05);
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
            }
            input[type="text"]:focus,
            input[type="password"]:focus,
            input[type="email"]:focus,
            textarea:focus,
            select:focus {
                border-color: var(--brand-orange);
                box-shadow: 0 0 0 3px rgba(236,110,5,0.15);
            }
            button, input[type="submit"] {
                border-radius: 9999px;
                font-weight: 700;
                transition: background-color 0.2s ease, transform 0.2s ease;
            }
            button:hover, input[type="submit"]:hover {
                transform: translateY(-0.5px);
            }
            .btn-primary {
                background-color: var(--brand-orange);
                color: #ffffff;
            }
            .btn-primary:hover {
                background-color: var(--brand-orange-dark);
            }
            .text-brand-red {
                color: var(--brand-red);
            }
            .bg-brand-red {
                background-color: var(--brand-red);
            }
            .bg-brand-orange {
                background-color: var(--brand-orange);
            }
        </style>
        {% block styles %}{% endblock %}
    </head>
    <body class="min-h-screen text-slate-900 antialiased">
        {% include "nav.html" %}
        <main class="mx-auto w-full max-w-6xl px-4 py-6 sm:px-6 lg:px-8">
            {% block page_content %}
            <div class="rounded-3xl border border-dashed border-slate-200 bg-white/90 p-8 text-slate-500 shadow-sm">
                <p>Ik hoor hier niet te zijn :)</p>
            </div>
            {% endblock %}
        </main>
        {% block scripts %}{% endblock %}
    </body>
</html>
